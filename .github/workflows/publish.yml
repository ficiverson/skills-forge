name: Publish to PyPI

# Triggered automatically when you push a version tag (v1.2.3),
# or manually from the Actions tab for a dry-run build check.
#
# SETUP (one-time):
# 1. Go to https://pypi.org/manage/account/
#    → API tokens → Add API token
#    → Scope: "Entire account" for the first upload (change to project scope later)
#    → Copy the token (starts with pypi-)
# 2. In this GitHub repo → Settings → Secrets and variables → Actions
#    → New repository secret
#    → Name:  PYPI_API_TOKEN
#    → Value: <paste the token>

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.2.3, v0.1.0, etc.
  workflow_dispatch:               # manual trigger for dry-run builds

jobs:
  # ── 1. Run the full test suite first ─────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Run tests
        run: pytest -q --tb=short

  # ── 2. Build the distribution artefacts ──────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build and twine
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Show metadata
        run: python -m zipfile -e dist/*.whl /tmp/whl_check/ && head -5 /tmp/whl_check/*.dist-info/METADATA

      - name: Check metadata (twine)
        run: python -m twine check dist/*

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ── 3. Publish to PyPI ────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    # Skip on workflow_dispatch so you can do a dry-run build without publishing
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        run: python -m twine upload dist/* --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
